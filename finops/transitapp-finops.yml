description: >-
  FinOps view of Transit API spend. The Transit API has a free access-key tier
  (5 requests/minute, 1,500 requests/month) with no invoice, and a
  negotiated partner tier for higher volumes and commercial use cases. Because
  the metered unit is API requests against a monthly cap, the dominant cost
  lever is request efficiency - caching static data (route details, network
  coverage) and pacing real-time polling so a workload stays inside the free
  budget or a negotiated partner allowance rather than paying for headroom it
  does not use.
notes: >-
  Partner-tier rates are not published; verify commercial terms with
  partners@transit.app during reconciliation. On the free tier there is no
  vendor invoice - the cost is entirely the engineering effort to stay within
  the request cap.
