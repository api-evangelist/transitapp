meters:
- name: api_requests
  description: API requests made against the Transit v3 API, capped per minute and per month on the free tier.
  unit: requests
  aggregation: sum
  dimensions:
  - apiKey
  - endpoint
- name: monthly_request_budget
  description: Monthly request allowance consumed against the free (1,500/month) or a negotiated partner budget.
  unit: requests
  aggregation: sum
  dimensions:
  - apiKey
principles:
- name: Visibility
  description: Track request counts per API key and per endpoint against the monthly cap so a workload never silently blows the free budget.
- name: Allocation
  description: Use separate access keys per product/workload so request consumption maps to internal cost centers and use cases.
- name: Optimization
  description: Cache static responses (route details, available networks) and pace real-time departure polling on an interval to minimize billable/quota-consuming requests.
- name: Accountability
  description: Assign an owner per access key; review monthly request consumption against the free cap or the negotiated partner allowance.
