  - url: https://github.com/thariq-shanavas/MMM-PublicTransit
    type: SourceCode
    note: Open-source consumer confirming base https://external.transitapp.com/v3, apiKey header, and GET /public/nearby_stops with lat/lon/max_distance.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists, and Transit's own public API is
    request/response REST authenticated with an apiKey header. No AsyncAPI
    document was created because there is no server-push transport (WebSocket or
    SSE) on Transit's own API to model; real-time data is delivered in REST
    responses and refreshed by client polling.
